<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="50" cy="50" r="48" fill="#ee1515"/>
          <path d="M2 50 A48 48 0 0 0 98 50 Z" fill="#f5f5f5"/>
          <rect x="2" y="45" width="96" height="10" fill="#222"/>
          <circle cx="50" cy="50" r="14" fill="#f5f5f5" stroke="#222" stroke-width="3"/>
          <circle cx="50" cy="50" r="7" fill="#f5f5f5" stroke="#222" stroke-width="2"/>
        </svg>
        <h1>Pokédex</h1>
      </div>
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search Pokémon..."
          autocomplete="off"
          spellcheck="false"
          maxlength="50"
        />
        <button id="searchBtn" disabled>Search</button>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <p id="noResults" class="no-results hidden">No Pokémon found for your search.</p>
      <p id="pokeCount" class="poke-count"></p>
      <div id="pokemonGrid" class="pokemon-grid"></div>
      <button id="loadMoreBtn" class="load-more-btn hidden">Load More Pokémon</button>
    </div>
  </main>

  <div id="loadingScreen" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="pokeball-spinner">
        <div class="pokeball-top"></div>
        <div class="pokeball-bottom"></div>
        <div class="pokeball-center"></div>
      </div>
      <p class="loading-text">Loading Pokémon<span class="loading-dots"></span></p>
    </div>
  </div>

  <div id="overlay" class="overlay hidden">
    <button id="prevBtn" class="nav-btn prev-btn" aria-label="Previous">&#8249;</button>
    <div id="overlayCard" class="overlay-card">
      <button id="closeBtn" class="close-btn" aria-label="Close">&#10005;</button>
      <div id="overlayContent"></div>
    </div>
    <button id="nextBtn" class="nav-btn next-btn" aria-label="Next">&#8250;</button>
  </div>

  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
